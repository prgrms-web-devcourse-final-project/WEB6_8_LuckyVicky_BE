spring:
  datasource:
    url: jdbc:h2:mem:db_test;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

# JWT 테스트 환경 설정
jwt:
  secret: test-secret-key-for-testing-environment-only
  access-token-expiration: 1800000    # 30분 (테스트용 짧은 시간)
  refresh-token-expiration: 3600000   # 1시간 (테스트용 짧은 시간)
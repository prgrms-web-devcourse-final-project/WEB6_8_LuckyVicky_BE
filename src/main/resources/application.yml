server:
  port: 8080
  forward-headers-strategy: native
spring:
  # redis가 개발/테스트 환경에서 작동하지 않도록 설정
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  application:
    name: back
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
  datasource:
    hikari:
      auto-commit: false
  jackson:
    serialization:
      fail-on-empty-beans: false
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
       # osiv 끄기
      open-in-view: false
  task:
    scheduling:
      pool:
        size: 5  # 스케줄러 스레드 풀 크기
      thread-name-prefix: funding-scheduler-
  # OAuth2 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-secret}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Naver
            scope:
              - name
              - email
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# Frontend URL (OAuth2 리다이렉트용)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# JWT 설정 (.env 파일 없어도 동작하도록 기본값 제공)
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}    # 1시간
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일

springdoc:
  default-produces-media-type: application/json;charset=UTF-8

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE
    com.back: DEBUG

# Actuator 설정
management:
  endpoints:
    web:
      base-path: /actuator            # 기본값이지만 명시
      exposure:
        include: health,info          # 필요시 metrics 등 추가
  endpoint:
    health:
      probes:
        enabled: true                 # /actuator/health/{liveness,readiness} 활성화
      show-details: never             # 프로브 용도면 never 권장(민감정보 차단)

# 도메인 설정
custom:
  dev: #개발환경에서
    cookieDomain: localhost
    frontUrl: "http://${custom.dev.cookieDomain}:3000" #localhost:3000
    backUrl: "http://${custom.dev.cookieDomain}:${server.port}" #localhost:8080
  prod: #운영환경에서
    cookieDomain: mori-mori.store
    frontUrl: "https://www.${custom.prod.cookieDomain}" #https://www.mori-mori.store
    backUrl: "https://api.${custom.prod.cookieDomain}" #https://api.mori-mori.store
  site: #기본적으로 개발 환경 도메인 활성화
    cookieDomain: "${custom.dev.cookieDomain}" #localhost
    frontUrl: "${custom.dev.frontUrl}" #localhost:3000
    backUrl: "${custom.dev.backUrl}" #localhost:8080
    name: mori-mori

# AWS S3 설정
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}
    stack:
      auto: false
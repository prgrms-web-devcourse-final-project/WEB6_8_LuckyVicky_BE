version: '3.8'

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm_1
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: 'Asia/Seoul'
      # These are read from the .env file in the same directory
      INITIAL_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD}
    volumes:
      - ./npm_data/data:/data
      - ./npm_data/letsencrypt:/etc/letsencrypt
    networks:
      - common

  redis:
    image: redis:latest
    container_name: redis_1
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: 'Asia/Seoul'
    # This is read from the .env file
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    networks:
      - common

networks:
  common:
    driver: bridge
    name: common
